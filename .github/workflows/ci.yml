name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: self-hosted
    container:
      image: ghcr.io/iterative-works/iw-cli-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Compile core (warnings as errors)
        run: scala-cli compile --scalac-option -Werror core/

  format:
    runs-on: self-hosted
    container:
      image: ghcr.io/iterative-works/iw-cli-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: scala-cli fmt --check .

  lint:
    runs-on: self-hosted
    container:
      image: ghcr.io/iterative-works/iw-cli-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Check scalafix rules
        run: scalafix --check --scala-version 3.3.7 --files core/ --files commands/

  test:
    needs: compile
    runs-on: self-hosted
    container:
      image: ghcr.io/iterative-works/iw-cli-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      WEBAWESOME_NPM_TOKEN: ${{ secrets.WEBAWESOME_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Run all tests
        run: ./iw ./test
        timeout-minutes: 30

  dashboard-build:
    needs: compile
    runs-on: self-hosted
    container:
      image: ghcr.io/iterative-works/iw-cli-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      WEBAWESOME_NPM_TOKEN: ${{ secrets.WEBAWESOME_NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble dashboard jar
        run: ./mill iwDashboardJar
        timeout-minutes: 15
      - name: Run dashboard integration tests
        run: ./mill dashboard.itest.testForked
        timeout-minutes: 15
