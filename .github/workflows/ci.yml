name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: self-hosted
    container:
      image: iw-cli-ci:latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile core (warnings as errors)
        run: scala-cli compile --scalac-option -Werror .iw/core/

  format:
    runs-on: self-hosted
    container:
      image: iw-cli-ci:latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: scala-cli fmt --check .

  lint:
    runs-on: self-hosted
    container:
      image: iw-cli-ci:latest
    steps:
      - uses: actions/checkout@v4
      - name: Check scalafix rules
        run: scalafix --check --scala-version 3.3.7 --files .iw/core/ --files .iw/commands/

  test:
    needs: compile
    runs-on: self-hosted
    container:
      image: iw-cli-ci:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run all tests
        run: ./iw test
        timeout-minutes: 30
